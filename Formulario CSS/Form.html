<html>
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="form-card">
        <div class="header-image">
            <img src="Imagen.jpeg" alt="Header Image">
        </div>
        
        <div class="form-header">
            <h2>Registro de Usuario</h2>
            <p>Únete a nuestra comunidad</p>
        </div>
        
        <form>
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <div class="name-group">
                    <input type="text" id="nombre" placeholder="Nombre" class="form-control">
                    <input type="text" id="apellido" placeholder="Apellido" class="form-control">
                </div>
            </div>
            
            <div class="form-group">
                <label for="telefono">Número de Teléfono:</label>
                <input type="tel" id="telefono" placeholder="(+57) ###-###-####" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" placeholder="correo@email.com" class="form-control">
            </div>
            
            <div class="form-group">
                <label>¿Cuáles son tus intereses?</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox"> Informática
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox"> Música
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox"> Arte Gráfico
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox"> Televisión
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="otros">Otros:</label>
                <input type="text" id="otros" placeholder="Especifica otros intereses" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" class="form-control">
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn-register">REGISTRARSE</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
