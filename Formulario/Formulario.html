<html>
<head>
<title>Registro de Usuario</title>
</head>

<body bgcolor="#E6E6E6">
<center>

<table width="700" bgcolor="white" cellpadding="1">

<tr>
<td colspan="2">
<img src="Imagen.jpeg" width="700">
</td>


</tr>

<tr>
<td colspan="2">
<center>    
<h2>Registro de Usuario</h2>
</td>
</tr>

<form>
<tr>
<td>Nombre Completo:</td>
<td>
<input type="text" placeholder="Nombre">
<input type="text" placeholder="Apellido">
</td>
</tr>

<tr>
<td>Número de Teléfono:</td>
<td>
<input type="tel" placeholder="(+57) ###-###-####">
</td>
</tr>

<tr>
<td>Correo Electrónico:</td>
<td>
<input type="email" placeholder="correo@email.com">
</td>
</tr>

<tr>
<td>¿Cuáles son tus intereses?</td>
<td>
<input type="checkbox"> Informática
<input type="checkbox"> Música<br>
<input type="checkbox"> Arte Gráfico
<input type="checkbox"> Televisión
</td>
</tr>

<tr>
<td>Otros:</td>
<td>
<input type="text" size="40">
</td>
</tr>

<tr>
<td>Contraseña:</td>
<td>
<input type="password" placeholder="Ingresa tu contraseña">
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="REGISTRARSE">

</td>
</tr>
</form>

</table>
</center>
</body>
</html>
